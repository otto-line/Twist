<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Twist</title>
    <style>
        @font-face {
            font-family: 'UnionTwist';
            src: url('Document fonts/Union_Twist_Semibold-Semibold.otf') format('opentype');
            font-weight: 600;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'UnionRegular';
            src: url('Document fonts/Union-Regular.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: #bfbfbf;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'UnionTwist', serif;
        }

        /* ── NAV ── */
        nav {
            padding: 5px;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            justify-content: flex-start;
            gap: 5px;
            counter-reset: nav-counter -1;
        }

        nav ul li {
            counter-increment: nav-counter;
        }

        nav ul li:last-child {
            margin-left: auto;
            counter-increment: none;
        }

        nav ul li a {
            display: inline-block;
            background-color: #d9d9d9;
            padding: 0.35rem 0.6rem;
            text-decoration: none;
            color: #000;
            font-family: 'UnionRegular', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        nav ul li a::after {
            content: " [" counter(nav-counter, decimal-leading-zero) ".]";
            opacity: 0.9;
        }

        nav ul li:last-child a::after {
            content: "";
        }

        nav ul li a:hover {
            background-color: #000;
            color: #fff;
        }

        /* ── FOOTER ── */
        footer {
            display: none;
            margin-top: 6rem;
            border-top: 1px solid #000;
            padding: 2rem 2rem 1.5rem;
            font-family: 'UnionRegular', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .footer-inner {
            width: 60%;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .footer-col p {
            margin: 0;
            line-height: 1.8;
        }

        .footer-col a {
            color: inherit;
            text-decoration: none;
        }

        .footer-col a:hover {
            background-color: #000;
            color: #fff;
        }

        .footer-bottom {
            border-top: 1px solid #000;
            padding-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @media (max-width: 640px) {
            .footer-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .footer-bottom {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="research.html">Research & Dev</a></li>
            <li><a href="cart.html">Cart <span id="cart-count"></span></a></li>
        </ul>
    </nav>
    <main></main>
    <footer>
        <div class="footer-inner">
        <div class="footer-grid">
            <div class="footer-col">
                <p><a href="#">Shipping + Returns</a></p>
                <p><a href="#">Warranty</a></p>
            </div>
            <div class="footer-col">
                <p>Location</p>
                <p>London, UK</p>
            </div>
            <div class="footer-col">
                <p>Contact</p>
                <p><a href="mailto:info@TWST.com">info@TWST.com</a></p>
                <p><a href="#">@TWST</a></p>
            </div>
        </div>
        </div>
        <div class="footer-bottom">
            <p>20260315 &copy; TWIST</p>
            <p>All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
